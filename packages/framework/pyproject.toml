[project]
name = "framework"
version = "0.1.0"
description = "Framework layer for Astra: APIs and abstractions for building AI agents, teams, and workflows"
requires-python = ">=3.10,<3.14"
authors = [
    { name = "Himanshu Sharma", email = "himanshu.kumarr07@gmail.com" }
]
dependencies = [
    "pydantic>=2.12.4",
    "observability",
    "memorybase",
    "pydantic-settings>=2.12.0",
    "aiosqlite>=0.19.0",
    "google-genai>=1.52.0",
    "sqlalchemy>=2.0.44",
    "greenlet>=3.0.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/framework"]

[tool.uv.sources]
observability = { workspace = true }
memorybase = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.1",
    "pytest-asyncio>=1.3.0",
    "pytest-benchmark>=5.2.3",
]
aws = [
    "boto3>=1.35.0",
    "aioboto3>=12.0.0",
]
