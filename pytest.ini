[pytest]
minversion = 6.0
addopts = -ra -q --asyncio-mode=auto
testpaths =
    astra/runtime/tests
    astra/observability/tests
pythonpath =
    astra/framework/src
    astra/observability/src
    astra/runtime/src
markers =
    unit: Unit tests
    integration: Integration tests
    benchmark: Performance benchmarks
